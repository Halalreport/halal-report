<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Data Tally System</title>
  <!-- Google Fonts: Inter & Noto Sans Ethiopic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Ethiopic:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-light: #eff6ff;
      --success: #10b981;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --border-color: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Noto Sans Ethiopic', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-main);
      color: var(--text-main);
      line-height: 1.5;
      padding: 24px 16px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Card Panels */
    .card-panel {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-sm);
      padding: 24px;
      margin-bottom: 24px;
      transition: box-shadow 0.2s ease;
    }

    .card-panel:hover {
      box-shadow: var(--shadow-md);
    }

    .panel-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Filters Layout */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 14px;
      font-size: 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: #fff;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary { background-color: var(--primary); color: white; }
    .btn-primary:hover { background-color: var(--primary-hover); }

    .btn-ghost {
      background-color: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border-color);
    }
    .btn-ghost:hover {
      background-color: #f1f5f9;
      color: var(--text-main);
    }

    .btn-danger-ghost {
      background-color: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }
    .btn-danger-ghost:hover {
      background-color: var(--danger);
      color: white;
    }

    .btn-export {
      background-color: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
      font-weight: 600;
    }
    .btn-export:hover {
      background-color: #10b981;
      color: white;
    }

    /* Table Styling */
    .table-container {
      width: 100%;
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.875rem;
    }

    thead th {
      background-color: #f8fafc;
      color: var(--text-muted);
      font-weight: 600;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background-color: #f8fafc; }

    .mono { font-family: monospace; font-size: 0.9em; }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .hidden { display: none !important; }

    /* Job Tally items */
    .job-tally-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: #f1f5f9;
      border-radius: 6px;
      margin-top: 6px;
    }
    .job-tally-item .rm {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Filter Control Panel -->
  <div class="card-panel">
    <div class="panel-title">🔍 ማጣሪያ እና ፍለጋ (Filters)</div>
    <div class="filter-grid">
      <div class="form-group">
        <label>ከቀን (From Date)</label>
        <input type="date" id="filt-from">
      </div>
      <div class="form-group">
        <label>እስከ ቀን (To Date)</label>
        <input type="date" id="filt-to">
      </div>
      <div class="form-group">
        <label>ጾታ (Gender)</label>
        <select id="filt-gender">
          <option value="">ሁሉም (All)</option>
          <option value="ወንድ">ወንድ</option>
          <option value="ሴት">ሴት</option>
        </select>
      </div>
      <div class="form-group">
        <label>ፍለጋ (Search)</label>
        <input type="text" id="filt-search" placeholder="ስም፣ ቦታ፣ መደብ...">
      </div>
      <div class="btn-group">
        <button type="button" class="btn-ghost" id="btn-clear-filter">አጽዳ (Clear)</button>
        <button type="button" class="btn-export" id="btn-export-csv">📥 CSV አውርድ (Export)</button>
      </div>
    </div>
  </div>

  <!-- History Table Panel -->
  <div class="card-panel">
    <div class="panel-title">📋 የቀደሙ መረጃዎች ሰንጠረዥ (Past Records)</div>
    <div class="table-container">
      <table>
        <thead id="hist-thead"></thead>
        <tbody id="hist-body"></tbody>
      </table>
      <div id="hist-empty" class="empty-state hidden">
        ምንም የተመዘገበ መረጃ አልተገኘም።
      </div>
    </div>
  </div>

</div>

<script>
// ---- Job Tally Draft for Edit Form ----
function renderJobTallyDraft(){
  const list = document.getElementById('so-job-list');
  if(!list) return;
  const entries = Object.entries(jobTallyDraft);
  if(entries.length === 0){
    list.innerHTML = `<div style="font-size:12px;color:var(--text-muted);">${currentLang==='en'?'No job types added yet':'ምንም የስራ አይነት አልተጨመረም'}</div>`;
    return;
  }
  list.innerHTML = entries.map(([job, count])=> `
    <div class="job-tally-item">
      <span><strong>${job}</strong>: ${count}</span>
      <button type="button" class="rm" data-job="${job}">✕ ${currentLang==='en'?'Remove':'አጥፋ'}</button>
    </div>
  `).join('');

  list.querySelectorAll('button.rm').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const j = e.target.dataset.job;
      delete jobTallyDraft[j];
      renderJobTallyDraft();
    });
  });
}

const btnAddJob = document.getElementById('btn-add-job');
if(btnAddJob) {
  btnAddJob.addEventListener('click', ()=>{
    const sel = document.getElementById('so-job-select');
    const countInput = document.getElementById('so-job-count');
    const job = sel.value;
    const count = Number(countInput.value)||0;
    if(!job || count <= 0){
      showToast(currentLang==='en'?'Please select a job type and enter a valid count':'እባክዎን የስራ አይነት ይምረጡና ትክክለኛ ብዛት ያስገቡ');
      return;
    }
    jobTallyDraft[job] = (jobTallyDraft[job]||0) + count;
    countInput.value = '';
    renderJobTallyDraft();
  });
}

// ---- Edit logic ----
function cancelEdit(){
  editState = { dept: null, id: null };
  jobTallyDraft = {};
  ['labor','insurance','social'].forEach(d=>{
    const box = document.getElementById(`edit-box-${d}`);
    const batch = document.getElementById(`batch-area-${d}`);
    if(box) box.classList.add('hidden');
    if(batch) batch.classList.remove('hidden');
  });
}

function startEdit(dept, id){
  editState = { dept, id };
  const L = currentLang==='en';
  let item = null;
  if(dept==='labor') item = laborEntries.find(r=> r.id===id);
  if(dept==='insurance') item = insuranceEntries.find(r=> r.id===id);
  if(dept==='social') item = socialEntries.find(r=> r.id===id);
  if(!item) return;

  document.querySelectorAll('.admin-tab').forEach(t=> t.classList.remove('active'));
  const entryTab = document.querySelector('.admin-tab[data-admin-tab="entry"]');
  if(entryTab) entryTab.classList.add('active');
  
  const panelEntry = document.getElementById('admin-panel-entry');
  const panelHist = document.getElementById('admin-panel-history');
  const panelSet = document.getElementById('admin-panel-settings');
  if(panelEntry) panelEntry.classList.remove('hidden');
  if(panelHist) panelHist.classList.add('hidden');
  if(panelSet) panelSet.classList.add('hidden');

  document.querySelectorAll('.dept-tab').forEach(t=> t.classList.remove('active'));
  const deptTab = document.querySelector(`.dept-tab[data-dept="${dept}"]`);
  if(deptTab) deptTab.classList.add('active');

  ['labor','insurance','social'].forEach(d=>{
    const deptEl = document.getElementById(`dept-${d}`);
    const editEl = document.getElementById(`edit-box-${d}`);
    const batchEl = document.getElementById(`batch-area-${d}`);
    if(deptEl) deptEl.classList.toggle('hidden', d!==dept);
    if(editEl) editEl.classList.add('hidden');
    if(batchEl) batchEl.classList.remove('hidden');
  });

  const p = dept==='labor'?'l': dept==='insurance'?'i':'so';
  const currentEditBox = document.getElementById(`edit-box-${dept}`);
  const currentBatchArea = document.getElementById(`batch-area-${dept}`);
  if(currentEditBox) currentEditBox.classList.remove('hidden');
  if(currentBatchArea) currentBatchArea.classList.add('hidden');

  document.getElementById(`${p}-collector`).value = item.collectorName || '';
  document.getElementById(`${p}-position`).value = item.position || '';
  document.getElementById(`${p}-gender`).value = item.gender || 'ወንድ';
  document.getElementById(`${p}-zone`).value = item.zone || '';
  document.getElementById(`${p}-woreda`).value = item.woreda || '';
  document.getElementById(`${p}-kebele`).value = item.kebele || '';
  document.getElementById(`${p}-date`).value = item.date || todayISO();

  if(dept==='labor'){
    document.getElementById('l-unemp-m').value = item.unempMale || 0;
    document.getElementById('l-unemp-f').value = item.unempFemale || 0;
    document.getElementById('l-notes').value = item.notes || '';
  }else if(dept==='insurance'){
    document.getElementById('i-new-m').value = item.newMale || 0;
    document.getElementById('i-new-f').value = item.newFemale || 0;
    document.getElementById('i-renew-m').value = item.renewMale || 0;
    document.getElementById('i-renew-f').value = item.renewFemale || 0;
    document.getElementById('i-notes').value = item.notes || '';
  }else if(dept==='social'){
    document.getElementById('so-elderly').value = item.elderly || 0;
    document.getElementById('so-disabled').value = item.disabled || 0;
    document.getElementById('so-women').value = item.women || 0;
    document.getElementById('so-children').value = item.children || 0;
    document.getElementById('so-income-low').value = item.incomeLow || 0;
    document.getElementById('so-income-mid').value = item.incomeMid || 0;
    document.getElementById('so-income-high').value = item.incomeHigh || 0;
    document.getElementById('so-notes').value = item.notes || '';
    jobTallyDraft = { ...(item.jobTypeCounts || {}) };
    renderJobTallyDraft();
  }
}

const btnSaveLabor = document.getElementById('btn-save-labor');
if(btnSaveLabor) {
  btnSaveLabor.addEventListener('click', async ()=>{
    if(editState.dept!=='labor' || !editState.id) return;
    const date = document.getElementById('l-date').value || todayISO();
    const rec = {
      collectorName: document.getElementById('l-collector').value.trim(),
      position: document.getElementById('l-position').value.trim(),
      gender: document.getElementById('l-gender').value,
      zone: document.getElementById('l-zone').value.trim(),
      woreda: document.getElementById('l-woreda').value.trim(),
      kebele: document.getElementById('l-kebele').value.trim(),
      date, ethDate: toEthiopianDate(date),
      unempMale: Number(document.getElementById('l-unemp-m').value)||0,
      unempFemale: Number(document.getElementById('l-unemp-f').value)||0,
      notes: document.getElementById('l-notes').value.trim()
    };
    try{
      await updateDoc(doc(db,'labor_tally',editState.id), rec);
      showToast(currentLang==='en'?'Updated successfully':'በተካከለ ሁኔታ ተሻሽሏል');
      cancelEdit();
    }catch(e){ console.error(e); showToast(currentLang==='en'?'Error updating':'ማሻሻል አልተሳካም'); }
  });
}

    try{

      showToast(currentLang==='en'?'Updated successfully':'በተካከለ ሁኔታ ተሻሽሏል');
      cancelEdit();
    }catch(e){ console.error(e); showToast(currentLang==='en'?'Error updating':'ማሻሻል አልተሳካም'); }

const btnSaveSocial = document.getElementById('btn-save-social');
if(btnSaveSocial) {
  btnSaveSocial.addEventListener('click', async ()=>{
    if(editState.dept!=='social' || !editState.id) return;
    const date = document.getElementById('so-date').value || todayISO();
    const rec = {
      collectorName: document.getElementById('so-collector').value.trim(),
      position: document.getElementById('so-position').value.trim(),
      gender: document.getElementById('so-gender').value,
      zone: document.getElementById('so-zone').value.trim(),

      kebele: document.getElementById('so-kebele').value.trim(),
      date, ethDate: toEthiopianDate(date),
      elderly: Number(document.getElementById('so-elderly').value)||0,
      disabled: Number(document.getElementById('so-disabled').value)||0,
      women: Number(document.getElementById('so-women').value)||0,
      children: Number(document.getElementById('so-children').value)||0,
      jobTypeCounts: { ...jobTallyDraft },
      incomeLow: Number(document.getElementById('so-income-low').value)||0,
      incomeMid: Number(document.getElementById('so-income-mid').value)||0,
      incomeHigh: Number(document.getElementById('so-income-high').value)||0,
      notes: document.getElementById('so-notes').value.trim()
    };
    try{
      await updateDoc(doc(db,'social_tally',editState.id), rec);
      showToast(currentLang==='en'?'Updated successfully':'በተካከለ ሁኔታ ተሻሽሏል');
      cancelEdit();
    }catch(e){ console.error(e); showToast(currentLang==='en'?'Error updating':'ማሻሻል አልተሳካም'); }
  });

// ---- Filter System ----
function filterEntries(arr){
  const fFrom = document.getElementById('filt-from').value;
  const fTo = document.getElementById('filt-to').value;
  const fGender = document.getElementById('filt-gender').value;
  const fSearch = document.getElementById('filt-search').value.toLowerCase().trim();

  return arr.filter(r=>{
    if(fFrom && r.date < fFrom) return false;
    if(fTo && r.date > fTo) return false;
    if(fGender && r.gender !== fGender) return false;
    if(fSearch){
      const text = `${r.collectorName||''} ${r.kebele||''} ${r.woreda||''} ${r.zone||''} ${r.position||''} ${r.notes||''}`.toLowerCase();
      if(!text.includes(fSearch)) return false;
    }
    return true;
  });
}

document.getElementById('filt-from').addEventListener('change', renderHistTable);
document.getElementById('filt-to').addEventListener('change', renderHistTable);
document.getElementById('filt-gender').addEventListener('change', renderHistTable);
document.getElementById('filt-search').addEventListener('input', renderHistTable);

document.getElementById('btn-clear-filter').addEventListener('click', ()=>{
  document.getElementById('filt-from').value = '';
  document.getElementById('filt-to').value = '';
  document.getElementById('filt-gender').value = '';
  document.getElementById('filt-search').value = '';
  renderHistTable();
});

// ---- Render Past Entries Table ----
function renderHistTable(){
  if(typeof adminUnlocked !== 'undefined' && !adminUnlocked) return;
  const head = document.getElementById('hist-thead');
  const body = document.getElementById('hist-body');
  const empty = document.getElementById('hist-empty');
  const L = typeof currentLang !== 'undefined' ? currentLang==='en' : false;

  let currentTab = typeof activeHistTab !== 'undefined' ? activeHistTab : 'labor';
  let rawList = currentTab==='labor'? (window.laborEntries||[]) : currentTab==='insurance'? (window.insuranceEntries||[]) : (window.socialEntries||[]);
  
  rawList.sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));
  const list = filterEntries(rawList);

  if(list.length === 0){
    head.innerHTML = ''; body.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  let ths = `<th>${L?'Date (Eth)':'ቀን (ኢት)'}</th><th>${L?'Collector':'ሰብሳቢ'}</th><th>${L?'Pos.':'መደብ'}</th><th>${L?'Gender':'ጾታ'}</th><th>${L?'Location':'ቦታ (ቀ/ወ/ዞ)'}</th>`;

  if(currentTab==='labor'){
    ths += `<th>${L?'Unemp M':'ስ.አጥ ወ'}</th><th>${L?'Unemp F':'ስ.አጥ ሴ'}</th><th>${L?'Total':'ድምር'}</th>`;
  }else if(currentTab==='insurance'){
    ths += `<th>${L?'New M':'አዲስ ወ'}</th><th>${L?'New F':'አዲስ ሴ'}</th><th>${L?'Renew M':'ያደሱ ወ'}</th><th>${L?'Renew F':'ያደሱ ሴ'}</th><th>${L?'Total':'ድምር'}</th>`;
  }else{
    ths += `<th>${L?'Vulnerable':'ተጋላጭ'}</th><th>${L?'Job Types':'ስራ አይነቶች'}</th><th>${L?'Income Level':'ገቢ ደረጃ'}</th>`;
  }
  ths += `<th>${L?'Notes':'ማስታወሻ'}</th><th>${L?'Actions':'ድርጊት'}</th>`;
  head.innerHTML = `<tr>${ths}</tr>`;

  body.innerHTML = list.map(r=>{
    const escapeAttr = (str) => String(str).replace(/"/g, '&quot;');
    const loc = [r.kebele?`ቀበሌ:${r.kebele}`:'', r.woreda?`ወረዳ:${r.woreda}`:'', r.zone?`ዞን:${r.zone}`:''].filter(Boolean).join(', ') || '—';
    let dataCols = '';

    if(currentTab==='labor'){
      const m = r.unempMale||0, f = r.unempFemale||0;
      dataCols = `<td class="mono">${m}</td><td class="mono">${f}</td><td class="mono"><strong>${m+f}</strong></td>`;
    }else if(currentTab==='insurance'){
      const nm = r.newMale||0, nf = r.newFemale||0, rm = r.renewMale||0, rf = r.renewFemale||0;
      dataCols = `<td class="mono">${nm}</td><td class="mono">${nf}</td><td class="mono">${rm}</td><td class="mono">${rf}</td><td class="mono"><strong>${nm+nf+rm+rf}</strong></td>`;
    }else{
      const vul = [r.elderly?`አረጋውያን:${r.elderly}`:'', r.disabled?`አካል ጉዳተኞች:${r.disabled}`:'', r.women?`ሴቶች:${r.women}`:'', r.children?`ህጻናት:${r.children}`:''].filter(Boolean).join(', ') || '—';
      const jobs = Object.entries(r.jobTypeCounts||{}).map(([k,v])=> `${k}:${v}`).join(', ') || '—';
      const inc = [r.incomeLow?`ዝቅተኛ:${r.incomeLow}`:'', r.incomeMid?`መካከለኛ:${r.incomeMid}`:'', r.incomeHigh?`ከፍተኛ:${r.incomeHigh}`:''].filter(Boolean).join(', ') || '—';
      dataCols = `<td>${vul}</td><td>${jobs}</td><td>${inc}</td>`;
    }

    return `<tr>
      <td class="mono">${r.ethDate || r.date || ''}</td>
      <td><strong>${escapeAttr(r.collectorName||'—')}</strong></td>
      <td>${escapeAttr(r.position||'—')}</td>
      <td>${r.gender||'—'}</td>
      <td>${escapeAttr(loc)}</td>
      ${dataCols}
      <td>${escapeAttr(r.notes||'—')}</td>
      <td>
        <div class="btn-group">
          <button type="button" class="btn-ghost" style="padding:4px 8px; font-size: 0.75rem;" onclick="window.editRecord('${currentTab}','${r.id}')">✏️ ${L?'Edit':'አስተካክል'}</button>
          <button type="button" class="btn-danger-ghost" style="padding:4px 8px; font-size: 0.75rem;" onclick="window.deleteRecord('${currentTab}','${r.id}')">🗑️ ${L?'Delete':'አጥፋ'}</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

window.editRecord = (dept, id) => startEdit(dept, id);

window.deleteRecord = async (dept, id)=>{
  const L = typeof currentLang !== 'undefined' ? currentLang==='en' : false;
  const confirmMsg = L ? 'Are you sure you want to delete this record?' : 'እርግጠኛ ነዎት ይህንን መረጃ ማጥፋት ይፈልጋሉ?';
  if(!confirm(confirmMsg)) return;
  const collName = dept==='labor'?'labor_tally': dept==='insurance'?'insurance_tally':'social_tally';
  try{
    await deleteDoc(doc(db, collName, id));
    showToast(L?'Record deleted':'መረጃው ተሰርዟል');
  }catch(e){
    console.error('Delete error', e);
    showToast(L?'Error deleting record':'መረጃውን ማጥፋት አልተሳካም');
  }
};

// ---- Export CSV ----
document.getElementById('btn-export-csv').addEventListener('click', ()=>{
  const L = typeof currentLang !== 'undefined' ? currentLang==='en' : false;
  let currentTab = typeof activeHistTab !== 'undefined' ? activeHistTab : 'labor';
  let rawList = currentTab==='labor'? (window.laborEntries||[]) : currentTab==='insurance'? (window.insuranceEntries||[]) : (window.socialEntries||[]);
  
  const list = filterEntries(rawList);
  if(list.length === 0){ showToast(L?'No data to export':'የሚወርድ መረጃ የለም'); return; }

  let headers = ['ቀን (Gregorian)','ቀን (Ethiopian)','ሰብሳቢ ስም','የስራ መደብ','ጾታ','ዞን','ወረዳ','ቀበሌ'];
  if(currentTab==='labor'){
    headers.push('ስራ አጥ ወንድ','ስራ አጥ ሴት','ድምር','ማስታወሻ');
  }else if(currentTab==='insurance'){
    headers.push('አዲስ ወንድ','አዲስ ሴት','ያደሱ ወንድ','ያደሱ ሴት','ድምር','ማስታወሻ');
  }else{
    headers.push('አረጋውያን','አካል ጉዳተኞች','ሴቶች','ህጻናት','የስራ አይነቶች','ዝቅተኛ ገቢ','መካከለኛ ገቢ','ከፍተኛ ገቢ','ማስታወሻ');
  }

  const csvRows = [headers.join(',')];

  list.forEach(r=>{
    const base = [
      `"${r.date||''}"`, `"${r.ethDate||''}"`, `"${(r.collectorName||'').replace(/"/g,'""')}"`,
      `"${(r.position||'').replace(/"/g,'""')}"`, `"${r.gender||''}"`,
      `"${(r.zone||'').replace(/"/g,'""')}"`, `"${(r.woreda||'').replace(/"/g,'""')}"`, `"${(r.kebele||'').replace(/"/g,'""')}"`
    ];
    if(currentTab==='labor'){
      const m = r.unempMale||0, f = r.unempFemale||0;
      base.push(m, f, m+f, `"${(r.notes||'').replace(/"/g,'""')}"`);
    }else if(currentTab==='insurance'){
      const nm = r.newMale||0, nf = r.newFemale||0, rm = r.renewMale||0, rf = r.renewFemale||0;
      base.push(nm, nf, rm, rf, nm+nf+rm+rf, `"${(r.notes||'').replace(/"/g,'""')}"`);
    }else{
      const jobs = Object.entries(r.jobTypeCounts||{}).map(([k,v])=> `${k}:${v}`).join('; ');
      base.push(
        r.elderly||0, r.disabled||0, r.women||0, r.children||0,
        `"${jobs.replace(/"/g,'""')}"`,
        r.incomeLow||0, r.incomeMid||0, r.incomeHigh||0,
        `"${(r.notes||'').replace(/"/g,'""')}"`
      );
    }
    csvRows.push(base.join(','));
  });

  const blob = new Blob(["\uFEFF" + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentTab}_data_${typeof todayISO !== 'undefined' ? todayISO() : 'export'}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
